name: Package vscode-html-languageserver

on:
  workflow_dispatch:
    inputs:
      vscode_version:
        description: 'VS Code version (e.g., 1.85.0)'
        type: string
        required: true
      patches_version:
        description: 'Patch version'
        type: string
        required: true
        default: '1'

jobs:
  package_html_server:
    name: Package HTML Language Server
    runs-on: ubuntu-latest
    permissions: write-all
    env:
      VERSION: ${{ inputs.vscode_version }}
      PATCHED_VERSION: ${{ inputs.vscode_version }}-patch-${{ inputs.patches_version }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download VS Code Source
        run: |
          curl -L -o "v${VERSION}.tar.gz" "https://github.com/microsoft/vscode/archive/refs/tags/${VERSION}.tar.gz"
          tar -xzf "v${VERSION}.tar.gz"

      - name: Build Server
        run: |
          # Navigate to the HTML language server directory
          cd "vscode-${VERSION}/extensions/html-language-features/server"
          
          # Install build tools
          npm install @vercel/ncc typescript
          
          # Fix: Use ESM paths if NCC struggles with UMD (similar to your JSON fix)
          if [ -f "node_modules/vscode-html-languageservice/package.json" ]; then
            sed -i 's/\/umd\//\/esm\//g' node_modules/vscode-html-languageservice/package.json
          fi

          # Build into a single file
          # The entry point for HTML is usually htmlServerMain.ts
          npx ncc build src/node/htmlServerNodeMain.ts --out dist --license LICENSES

      - name: Bundle and Compress
        run: |
          mkdir -p bundle/vscode-html-languageserver
          
          # Copy the built JS and License
          cp -r vscode-${VERSION}/extensions/html-language-features/server/dist/* bundle/vscode-html-languageserver/
          cp vscode-${VERSION}/LICENSE.txt bundle/vscode-html-languageserver/
          
          cd bundle
          tar -zcvf ../vscode-html-languageserver-${PATCHED_VERSION}.tar.gz vscode-html-languageserver

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="html-server-${PATCHED_VERSION}"
          gh release delete "$TAG" -y || true
          gh release create "$TAG" "vscode-html-languageserver-${PATCHED_VERSION}.tar.gz" \
            --title "HTML Language Server ${PATCHED_VERSION}" \
            --notes "Standalone build of vscode-html-languageserver from VS Code version ${VERSION}"
